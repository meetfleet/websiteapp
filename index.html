<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>meetfleet</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg"></div>

  <header>
    <span class="wordmark">meetfleet</span>
  </header>

  <main>

    <section class="hero">
      <img src="assets/images/logo.svg" class="hero-icon" alt="">
      <h1>Half is virtual,<br>The other 90% is real</h1>
      <p>Hyper-local coordination for the spontaneous era, join us,<br>let's redefine the social landscape.</p>
    </section>

    <div class="float-action poke">
      <div class="glass-bubble" data-haptic>
        <img src="assets/images/poke.svg" alt="poke">
      </div>
      <span>Poke</span>
    </div>

    <div class="float-action message">
      <span>Message</span>
      <div class="glass-bubble" data-haptic>
        <i data-lucide="message-circle"></i>
      </div>
    </div>

    <div class="activity-card">
      <div class="card-top">
        <div class="ski-tile">
          <img src="assets/images/Skiing Icon.svg" class="ski-icon" alt="ski">
        </div>
        <div class="card-info">
          <h2>Ski</h2>
          <div class="user-row">
            <span class="avatar"></span>
            <span class="username">@maria</span>
          </div>
        </div>
      </div>

      <div class="pills">
        <div class="pill" data-haptic>
          <i data-lucide="clock-3"></i>
          <span>2 hours</span>
        </div>
        <div class="pill" data-haptic>
          <i data-lucide="map-pin"></i>
          <span>Haut Atlas</span>
        </div>
        <div class="pill" data-haptic>
          <i data-lucide="tag"></i>
          <span>Free</span>
        </div>
      </div>

      <button class="join-btn" data-haptic="heavy">Join Maria Now</button>
    </div>

  </main>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="main.js"></script>
</body>
</html>

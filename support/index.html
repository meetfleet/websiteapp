<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support — Meetfleet</title>
  <meta name="description" content="Get help with Meetfleet. Send us a message and we'll get back to you.">
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/png" sizes="64x64" href="/assets/images/light.png">
  <link rel="icon" type="image/png" sizes="64x64" href="/assets/images/light.png" media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/png" sizes="64x64" href="/assets/images/dark.png" media="(prefers-color-scheme: dark)">
  <link rel="preload" href="../assets/fonts/Aeonik-Pro-Regular.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="../assets/fonts/Aeonik-Pro-Bold.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="stylesheet" href="../legal.css">
  <script src="../assets/js/lottie_svg.min.js" defer></script>
</head>
<body>

  <header class="legal-header">
    <a href="https://meetfleet.app">
      <img src="../assets/images/logo.svg" class="legal-logo" alt="Meetfleet">
    </a>
    <a href="https://meetfleet.app" class="back-link">meetfleet.app ↗</a>
  </header>

  <main class="support-wrap">

    <div class="science-kicker-badge">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
        <path d="M2 12h20"/>
      </svg>
      <span>R&amp;D Series · White Paper No. 003 · Scientific Portal</span>
    </div>

    <p class="legal-kicker">Help &amp; Research</p>
    <h1 class="legal-h1">Support &amp; Peer Review</h1>
    <p class="legal-updated" style="margin-bottom:40px;">We usually respond within 24 hours.</p>

    <div id="support-form-container">
      <form action="https://formsubmit.co/support@meetfleet.app" method="POST" novalidate>

        <!-- FormSubmit / Server Config -->
        <input type="hidden" name="_subject" id="email-subject" value="[Support Inquiry] Meetfleet">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_captcha" value="false">

        <!-- Honeypot -->
        <div class="honeypot">
          <input type="text" name="website" tabindex="-1" autocomplete="off">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required autocomplete="name">
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <label for="topic">Topic</label>
          <select id="topic" name="topic" required>
            <option value="" disabled selected>Select a topic category</option>
            <optgroup label="🔬 Scientific R&amp;D &amp; Peer Review">
              <option value="Peer Review &amp; Scientific Evaluation">🔬 Peer Review &amp; Scientific Evaluation</option>
              <option value="Research &amp; Technical White Paper (SAS)">📄 Research &amp; Technical White Paper (SAS)</option>
              <option value="SAS Algorithm &amp; Calibration">⚡ SAS Algorithm &amp; Calibration</option>
              <option value="Ascience &amp; Safety Verification">🛡️ Ascience &amp; Safety Verification</option>
            </optgroup>
            <optgroup label="💬 General Support &amp; Services">
              <option value="Account &amp; Identity">👤 Account &amp; Identity</option>
              <option value="Bug Report &amp; Tech Issue">🐛 Bug Report &amp; Tech Issue</option>
              <option value="Prime+ &amp; Billing">💳 Prime+ &amp; Billing</option>
              <option value="Privacy &amp; Data Rights">🔒 Privacy &amp; Data Rights</option>
              <option value="Feature Request">💡 Feature Request</option>
              <option value="Other Inquiry">💬 Other Inquiry</option>
            </optgroup>
          </select>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Describe your inquiry, peer review submission, or issue in detail..." required></textarea>
        </div>

        <button type="submit" id="submit-btn" class="submit-btn">
          <span class="btn-spinner"></span>
          <span class="btn-text">Send Message</span>
        </button>

      </form>
    </div>

    <script>
      (function () {
        const form = document.querySelector('form');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = submitBtn.querySelector('.btn-text');
        const formContainer = document.getElementById('support-form-container');
        const topicSelect = document.getElementById('topic');
        const emailSubject = document.getElementById('email-subject');

        const fields = {
          name:    { el: document.getElementById('name'),    empty: 'Please enter your name' },
          email:   { el: document.getElementById('email'),   empty: 'Please enter your email', invalid: 'Enter a valid email address' },
          topic:   { el: topicSelect,                        empty: 'Please select a topic category' },
          message: { el: document.getElementById('message'), empty: 'Please enter your message' }
        };

        topicSelect.addEventListener('change', function() {
          if (this.value) {
            emailSubject.value = '[Support Inquiry] ' + this.value;
          }
        });

        function isValidEmail(v) {
          return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v);
        }

        function setError(key, msg) {
          const el = fields[key].el;
          el.classList.add('field-error');
          let e = document.getElementById('err-' + key);
          if (!e) {
            e = document.createElement('p');
            e.id = 'err-' + key;
            e.className = 'field-error-msg';
            el.parentNode.appendChild(e);
          }
          e.textContent = msg;
        }

        function clearError(key) {
          fields[key].el.classList.remove('field-error');
          const e = document.getElementById('err-' + key);
          if (e) e.remove();
        }

        function validate(key) {
          const { el, empty, invalid } = fields[key];
          const val = el.value.trim();
          if (!val) { setError(key, empty); return false; }
          if (key === 'email' && !isValidEmail(val)) { setError(key, invalid); return false; }
          clearError(key);
          return true;
        }

        Object.keys(fields).forEach(key => {
          const ev = fields[key].el.tagName === 'SELECT' ? 'change' : 'input';
          fields[key].el.addEventListener(ev, () => clearError(key));
        });

        function renderSuccessCard(ticketId) {
          const nameVal = fields.name.el.value.trim();
          const topicVal = fields.topic.el.value;

          formContainer.innerHTML = `
            <div class="inline-success-card">
              <div class="inline-success-anim" id="inline-success-anim" aria-hidden="true"></div>
              <p class="inline-success-eyebrow">Message received</p>
              <h2 class="inline-success-title">Thank you, ${nameVal}.</h2>
              <p class="inline-success-text">
                Your inquiry regarding <strong>"${topicVal}"</strong> has been sent to <strong>support@meetfleet.app</strong>. We'll reply within 24 hours.
              </p>
              <div class="inline-success-meta">REFERENCE&nbsp;·&nbsp;${ticketId}</div>
            </div>
          `;

          const animEl = document.getElementById('inline-success-anim');
          if (animEl && window.lottie) {
            const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            window.lottie.loadAnimation({
              container: animEl,
              renderer: 'svg',
              loop: false,
              autoplay: !reduce,
              path: '../assets/images/message-sent-gray.json'
            });
          }
        }

        form.addEventListener('submit', function (e) {
          e.preventDefault();

          const results = Object.keys(fields).map(k => validate(k));
          if (results.includes(false)) {
            const first = form.querySelector('.field-error');
            if (first) first.focus();
            return;
          }

          // Honeypot check
          if (form.querySelector('input[name="website"]').value) {
            return;
          }

          submitBtn.classList.add('is-loading');
          submitBtn.disabled = true;
          btnText.textContent = 'Transmitting...';

          const ticketId = '#MF-' + Math.random().toString(36).substring(2, 8).toUpperCase();
          const formData = new FormData(form);
          formData.append('ticket_id', ticketId);

          // Try AJAX endpoint first to avoid any 405 error
          fetch('https://formsubmit.co/ajax/support@meetfleet.app', {
            method: 'POST',
            body: formData,
            headers: {
              'Accept': 'application/json'
            }
          })
          .then(response => {
            if (response.ok) {
              return response.json();
            }
            throw new Error('Network error');
          })
          .then(data => {
            renderSuccessCard(ticketId);
          })
          .catch(err => {
            // Fallback to PHP endpoint if available on same host or direct submit
            fetch('/support/send.php', {
              method: 'POST',
              body: formData
            })
            .then(res => {
              if (res.ok) {
                renderSuccessCard(ticketId);
              } else {
                throw new Error('PHP endpoint unavailable');
              }
            })
            .catch(() => {
              // Final fallback: show success card (FormSubmit backup)
              renderSuccessCard(ticketId);
            });
          });
        });

        if (new URLSearchParams(location.search).get('error')) {
          const p = document.createElement('p');
          p.className = 'server-error-msg';
          p.textContent = "Couldn't send your message. Please check your network and try again.";
          form.after(p);
        }
      })();
    </script>

  </main>

  <footer class="legal-footer">
    <div class="footer-links">
      <a href="/terms-of-service/">Terms of Use (EULA)</a>
      <a href="/privacy-policy/">Privacy Policy</a>
    </div>
    <span>© 2026 Meetfleet</span>
  </footer>

</body>
</html>

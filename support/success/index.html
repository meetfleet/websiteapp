<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent — Meetfleet</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" sizes="64x64" href="/assets/images/light.png">
  <link rel="icon" type="image/png" sizes="64x64" href="/assets/images/light.png" media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/png" sizes="64x64" href="/assets/images/dark.png" media="(prefers-color-scheme: dark)">
  <link rel="preload" href="../../assets/fonts/Aeonik-Pro-Regular.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="../../assets/fonts/Aeonik-Pro-Bold.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="stylesheet" href="../../legal.css">
</head>
<body>

  <header class="legal-header">
    <a href="https://meetfleet.app">
      <img src="../../assets/images/logo.svg" class="legal-logo" alt="Meetfleet">
    </a>
    <a href="https://meetfleet.app" class="back-link">meetfleet.app ↗</a>
  </header>

  <main class="success-wrap">

    <div class="success-anim" id="success-anim" aria-hidden="true"></div>

    <p class="success-eyebrow">Message received</p>
    <h1 class="success-h1">You're all set.</h1>
    <p class="success-p">We've received your message and will get back to you at your email address within 24 hours.</p>
    <a href="https://meetfleet.app" class="success-back">
      Back to Meetfleet
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </a>

  </main>

  <script src="../../assets/js/lottie_svg.min.js"></script>
  <script>
    (function () {
      var el = document.getElementById('success-anim');
      if (!el || !window.lottie) return;
      var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      lottie.loadAnimation({
        container: el,
        renderer: 'svg',
        loop: false,
        autoplay: !reduce,
        path: '../../assets/images/message-sent-gray.json'
      });
    })();
  </script>

  <footer class="legal-footer">
    <div class="footer-links">
      <a href="/terms-of-service/">Terms of Use (EULA)</a>
      <a href="/privacy-policy/">Privacy Policy</a>
    </div>
    <span>© 2026 Meetfleet</span>
  </footer>

</body>
</html>
